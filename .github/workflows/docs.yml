name: Xodium CI/CD - Docs

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "build.gradle.kts"
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v6.0.2

      - id: setup-java
        name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 21
          distribution: temurin

      - id: setup-gradle
        name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - id: generate-docs
        name: Generate Dokka Documentation
        run: ./gradlew dokkaGenerateHtml

      - id: upload-artifact
        name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
