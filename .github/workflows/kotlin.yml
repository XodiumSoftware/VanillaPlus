name: Xodium CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    environment:
      name: "${{ github.ref_name }}"
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v6.0.2

      - id: setup_java
        name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 21
          distribution: temurin

      - id: setup_gradle
        name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - id: run_lint
        name: Run Lint
        run: ./gradlew ktlintCheck

  build:
    name: Build
    needs: [ lint ]
    runs-on: ubuntu-latest
    environment:
      name: "${{ github.ref_name }}"
    outputs:
      VERSION: "${{ steps.get_version.outputs.VERSION }}"
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v6.0.2

      - id: setup_java
        name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 21
          distribution: temurin

      - id: setup_gradle
        name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - id: build_gradle
        name: Build with Gradle
        run: ./gradlew shadowJar

      - id: get_version
        name: Get Version
        run: echo "VERSION=$(./gradlew properties --quiet --console=plain -q version 2>/dev/null | cut -d' ' -f2)" >> $GITHUB_OUTPUT
        shell: bash

      - id: upload_artifact
        name: Upload Build Artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          path: build/libs/*.jar

  nightly_release:
    name: Nightly Release
    needs: [ build ]
    runs-on: ubuntu-latest
    environment:
      name: "${{ github.ref_name }}"
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v6.0.2

      - id: download_artifacts
        name: Download Artefacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: "artifact"
          path: dist/
          merge-multiple: true

      - id: update_nightly_tag
        name: Update Nightly Tag
        run: |
          gh api repos/${{ github.repository }}/git/refs/tags/nightly \
            --method PATCH \
            --field sha=${{ github.sha }} \
            --field force=true 2>/dev/null || \
          gh api repos/${{ github.repository }}/git/refs \
            --method POST \
            --field ref=refs/tags/nightly \
            --field sha=${{ github.sha }}
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - id: create_nightly_release
        name: Create Nightly Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          prerelease: true
          files: dist/*.jar
          tag_name: nightly
          name: Nightly Build
          body: |
            From commit: ${{ github.sha }}
            Generated on: ${{ github.event.head_commit.timestamp }}

  docs:
    name: Documentation
    needs: [ lint ]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: "${{ steps.deployment.outputs.page_url }}"
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v6.0.2

      - id: setup_java
        name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          java-version: 21
          distribution: temurin

      - id: setup_gradle
        name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - id: generate_docs
        name: Generate Dokka Documentation
        run: ./gradlew dokkaGenerateHtml

      - id: upload_artifact
        name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
